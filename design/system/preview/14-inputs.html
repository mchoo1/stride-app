<!doctype html><html><head><meta charset="utf-8"><title>Inputs</title><link rel="stylesheet" href="../colors_and_type.css"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><style>
body{padding:16px;}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
.col{display:flex;flex-direction:column;gap:4px;}
.sw{width:88px;height:56px;border-radius:12px;border:1px solid var(--hairline);}
.sw-lg{width:120px;height:72px;border-radius:14px;border:1px solid var(--hairline);}
.tile{display:flex;flex-direction:column;gap:6px;}
.tile .name{font-size:12px;font-weight:600;color:var(--fg-1);}
.tile .hex{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);}
</style></head><body>
<style>.fld{display:flex;flex-direction:column;gap:4px;width:240px;} .in{width:100%;background:#fff;border:1.5px solid #E5E9F2;border-radius:12px;padding:11px 14px;font-size:15px;color:#0F1B2D;font-family:inherit;outline:none;} .in:focus{border-color:#1E7F5C;box-shadow:0 0 0 3px rgba(30,127,92,.15);} .in::placeholder{color:#8B95A7;}</style>
<div class="row" style="gap:14px;align-items:flex-start;">
  <div class="fld"><label class="label">SEARCH FOOD</label><input class="in" placeholder="e.g. chicken rice"/></div>
  <div class="fld"><label class="label">WEIGHT (KG)</label><input class="in" value="68.4" style="border-color:#1E7F5C;box-shadow:0 0 0 3px rgba(30,127,92,.15);"/></div>
</div></body></html>
