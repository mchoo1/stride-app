<!doctype html><html><head><meta charset="utf-8"><title>Status chips</title><link rel="stylesheet" href="../colors_and_type.css"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><style>
body{padding:16px;}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
.col{display:flex;flex-direction:column;gap:4px;}
.sw{width:88px;height:56px;border-radius:12px;border:1px solid var(--hairline);}
.sw-lg{width:120px;height:72px;border-radius:14px;border:1px solid var(--hairline);}
.tile{display:flex;flex-direction:column;gap:6px;}
.tile .name{font-size:12px;font-weight:600;color:var(--fg-1);}
.tile .hex{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);}
</style></head><body>
<style>.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;font-size:13px;font-weight:600;} .dot{width:6px;height:6px;border-radius:50%;}</style>
<div class="row" style="gap:10px;">
  <span class="chip" style="background:rgba(30,127,92,.1);color:#1E7F5C;"><span class="dot" style="background:#13A26B"></span>On track</span>
  <span class="chip" style="background:rgba(242,169,59,.12);color:#B07B20;"><span class="dot" style="background:#F2A93B"></span>Close to budget</span>
  <span class="chip" style="background:rgba(208,78,54,.1);color:#D04E36;"><span class="dot" style="background:#D04E36"></span>320 over</span>
  <span class="chip" style="background:rgba(15,27,45,.06);color:#0F1B2D;">Nothing logged</span>
</div></body></html>
