<!doctype html><html><head><meta charset="utf-8"><title>Buttons</title><link rel="stylesheet" href="../colors_and_type.css"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><style>
body{padding:16px;}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
.col{display:flex;flex-direction:column;gap:4px;}
.sw{width:88px;height:56px;border-radius:12px;border:1px solid var(--hairline);}
.sw-lg{width:120px;height:72px;border-radius:14px;border:1px solid var(--hairline);}
.tile{display:flex;flex-direction:column;gap:6px;}
.tile .name{font-size:12px;font-weight:600;color:var(--fg-1);}
.tile .hex{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);}
</style></head><body>
<style>
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;font-weight:600;font-size:14px;border:none;cursor:pointer;transition:all .15s var(--ease);}
.btn-primary{background:#1E7F5C;color:#fff;padding:12px 20px;border-radius:16px;box-shadow:0 6px 20px rgba(30,127,92,.25);}
.btn-secondary{background:#fff;color:#0F1B2D;padding:12px 20px;border-radius:16px;border:1px solid #E5E9F2;}
.btn-ghost{background:transparent;color:#1E7F5C;padding:12px 20px;border-radius:16px;}
.btn-danger{background:#D04E36;color:#fff;padding:12px 20px;border-radius:16px;}
.btn-sm{padding:8px 14px;font-size:13px;border-radius:12px;}
</style>
<div class="row" style="gap:10px;margin-bottom:12px;">
  <button class="btn btn-primary">Log food</button>
  <button class="btn btn-secondary">Cancel</button>
  <button class="btn btn-ghost">Skip</button>
  <button class="btn btn-danger">Delete</button>
</div>
<div class="row" style="gap:10px;">
  <button class="btn btn-primary btn-sm">Save</button>
  <button class="btn btn-secondary btn-sm">Edit</button>
  <button class="btn btn-primary" disabled style="opacity:.4">Loading</button>
</div></body></html>
