<!doctype html><html><head><meta charset="utf-8">
<title>Stride · app icon</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<style>
  body{margin:0;padding:18px 20px;font-family:Inter,system-ui;background:#fff;}
  .row{display:flex;gap:28px;align-items:center;}
  .stack{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .ios-lg{width:128px;height:128px;border-radius:28px;overflow:hidden;box-shadow:0 10px 28px rgba(15,27,45,.14);}
  .ios-md{width:72px;height:72px;border-radius:17px;overflow:hidden;box-shadow:0 4px 12px rgba(15,27,45,.12);}
  .ios-sm{width:44px;height:44px;border-radius:11px;overflow:hidden;box-shadow:0 2px 6px rgba(15,27,45,.1);}
  .android{width:104px;height:104px;border-radius:50%;overflow:hidden;background:#0F1B2D;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 28px rgba(15,27,45,.14);}
  .lbl{font-size:11px;color:#0F1B2D;font-weight:600;letter-spacing:.02em;}
  .sub{font-size:10px;color:#8B95A7;}
</style></head><body>
<div class="row">
  <div class="stack">
    <div class="ios-lg"><img src="../assets/logo/app-icon.svg" width="128" height="128"/></div>
    <div class="lbl">iOS · 1024</div>
    <div class="sub">Primary</div>
  </div>
  <div class="stack">
    <div class="ios-md"><img src="../assets/logo/app-icon.svg" width="72" height="72"/></div>
    <div class="lbl">72</div>
    <div class="sub">Notification</div>
  </div>
  <div class="stack">
    <div class="ios-sm"><img src="../assets/logo/app-icon.svg" width="44" height="44"/></div>
    <div class="lbl">44</div>
    <div class="sub">Spotlight</div>
  </div>
  <div class="stack">
    <div class="android">
      <img src="../assets/logo/app-icon-android-fg.svg" width="104" height="104"/>
    </div>
    <div class="lbl">Android adaptive</div>
    <div class="sub">Circle mask · navy bg</div>
  </div>
</div>
</body></html>
