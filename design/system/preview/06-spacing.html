<!doctype html><html><head><meta charset="utf-8"><title>Spacing · 4px grid</title><link rel="stylesheet" href="../colors_and_type.css"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><style>
body{padding:16px;}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
.col{display:flex;flex-direction:column;gap:4px;}
.sw{width:88px;height:56px;border-radius:12px;border:1px solid var(--hairline);}
.sw-lg{width:120px;height:72px;border-radius:14px;border:1px solid var(--hairline);}
.tile{display:flex;flex-direction:column;gap:6px;}
.tile .name{font-size:12px;font-weight:600;color:var(--fg-1);}
.tile .hex{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);}
</style></head><body>
<div style="display:flex;align-items:flex-end;gap:10px;">
  
  <div class="tile" style="align-items:center;"><div style="width:4px;height:4px;background:#1E7F5C;border-radius:4px;"></div><div class="hex" style="margin-top:4px;">4</div></div>
  
  <div class="tile" style="align-items:center;"><div style="width:8px;height:8px;background:#1E7F5C;border-radius:4px;"></div><div class="hex" style="margin-top:4px;">8</div></div>
  
  <div class="tile" style="align-items:center;"><div style="width:12px;height:12px;background:#1E7F5C;border-radius:4px;"></div><div class="hex" style="margin-top:4px;">12</div></div>
  
  <div class="tile" style="align-items:center;"><div style="width:16px;height:16px;background:#1E7F5C;border-radius:4px;"></div><div class="hex" style="margin-top:4px;">16</div></div>
  
  <div class="tile" style="align-items:center;"><div style="width:20px;height:20px;background:#1E7F5C;border-radius:4px;"></div><div class="hex" style="margin-top:4px;">20</div></div>
  
  <div class="tile" style="align-items:center;"><div style="width:24px;height:24px;background:#1E7F5C;border-radius:4px;"></div><div class="hex" style="margin-top:4px;">24</div></div>
  
  <div class="tile" style="align-items:center;"><div style="width:32px;height:32px;background:#1E7F5C;border-radius:4px;"></div><div class="hex" style="margin-top:4px;">32</div></div>
  
  <div class="tile" style="align-items:center;"><div style="width:40px;height:40px;background:#1E7F5C;border-radius:4px;"></div><div class="hex" style="margin-top:4px;">40</div></div>
  
  <div class="tile" style="align-items:center;"><div style="width:56px;height:56px;background:#1E7F5C;border-radius:4px;"></div><div class="hex" style="margin-top:4px;">56</div></div>
  
</div></body></html>
