<!doctype html><html><head><meta charset="utf-8"><title>Radii</title><link rel="stylesheet" href="../colors_and_type.css"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><style>
body{padding:16px;}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
.col{display:flex;flex-direction:column;gap:4px;}
.sw{width:88px;height:56px;border-radius:12px;border:1px solid var(--hairline);}
.sw-lg{width:120px;height:72px;border-radius:14px;border:1px solid var(--hairline);}
.tile{display:flex;flex-direction:column;gap:6px;}
.tile .name{font-size:12px;font-weight:600;color:var(--fg-1);}
.tile .hex{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);}
</style></head><body>
<div class="row">
  
  <div class="tile"><div style="width:76px;height:54px;background:#FFFFFF;border:1.5px solid #E5E9F2;border-radius:8px;"></div><div class="name">xs</div><div class="hex">8px</div></div>
  <div class="tile"><div style="width:76px;height:54px;background:#FFFFFF;border:1.5px solid #E5E9F2;border-radius:12px;"></div><div class="name">sm</div><div class="hex">12px</div></div>
  <div class="tile"><div style="width:76px;height:54px;background:#FFFFFF;border:1.5px solid #E5E9F2;border-radius:16px;"></div><div class="name">md</div><div class="hex">16px</div></div>
  <div class="tile"><div style="width:76px;height:54px;background:#FFFFFF;border:1.5px solid #E5E9F2;border-radius:20px;"></div><div class="name">lg</div><div class="hex">20px</div></div>
  <div class="tile"><div style="width:76px;height:54px;background:#FFFFFF;border:1.5px solid #E5E9F2;border-radius:28px;"></div><div class="name">xl</div><div class="hex">28px</div></div>
  <div class="tile"><div style="width:76px;height:54px;background:#FFFFFF;border:1.5px solid #E5E9F2;border-radius:999px;"></div><div class="name">pill</div><div class="hex">full</div></div>
</div></body></html>
