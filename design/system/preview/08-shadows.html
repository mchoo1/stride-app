<!doctype html><html><head><meta charset="utf-8"><title>Shadows</title><link rel="stylesheet" href="../colors_and_type.css"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><style>
body{padding:16px;}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
.col{display:flex;flex-direction:column;gap:4px;}
.sw{width:88px;height:56px;border-radius:12px;border:1px solid var(--hairline);}
.sw-lg{width:120px;height:72px;border-radius:14px;border:1px solid var(--hairline);}
.tile{display:flex;flex-direction:column;gap:6px;}
.tile .name{font-size:12px;font-weight:600;color:var(--fg-1);}
.tile .hex{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);}
</style></head><body>
<div class="row" style="gap:20px;">
  <div class="tile"><div style="width:110px;height:70px;background:#fff;border-radius:14px;box-shadow:0 1px 2px rgba(15,27,45,0.04),0 1px 3px rgba(15,27,45,0.03);"></div><div class="name">card</div></div>
  <div class="tile"><div style="width:110px;height:70px;background:#fff;border-radius:14px;box-shadow:0 2px 8px rgba(15,27,45,0.06),0 1px 3px rgba(15,27,45,0.04);"></div><div class="name">raised</div></div>
  <div class="tile"><div style="width:110px;height:70px;background:#fff;border-radius:14px;box-shadow:0 8px 24px rgba(15,27,45,0.08),0 2px 8px rgba(15,27,45,0.04);"></div><div class="name">hero</div></div>
  <div class="tile"><div style="width:110px;height:70px;background:#1E7F5C;border-radius:14px;box-shadow:0 6px 20px rgba(30,127,92,0.25);"></div><div class="name">cta glow</div></div>
</div></body></html>
