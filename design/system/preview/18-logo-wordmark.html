<!doctype html><html><head><meta charset="utf-8">
<title>Stride · wordmark</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<style>
  body{margin:0;padding:20px;font-family:Inter,system-ui;background:#fff;}
  .row{display:flex;flex-direction:column;gap:14px;}
  .lockup{display:flex;align-items:center;gap:14px;}
  .wm{font-family:'Archivo Black','Helvetica Neue',Arial,sans-serif;font-size:38px;letter-spacing:-1px;line-height:1;}
  .wm-sm{font-family:'Archivo Black';font-size:18px;letter-spacing:-.3px;line-height:1;}
  .chip-lg{width:44px;height:44px;background:#0F1B2D;border-radius:10px;display:flex;align-items:center;justify-content:center;}
  .chip-sm{width:22px;height:22px;background:#0F1B2D;border-radius:6px;display:flex;align-items:center;justify-content:center;}
  .bar{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #E5E9F2;border-radius:14px;padding:10px 16px;width:fit-content;}
  .dark{background:#0F1B2D;border-radius:14px;padding:12px 18px;color:#fff;display:inline-flex;align-items:center;gap:10px;}
</style></head><body>
<div class="row">

  <!-- Primary lockup -->
  <div class="lockup">
    <div class="chip-lg">
      <svg width="28" height="28" viewBox="0 0 120 120"><path d="M32 92 C 32 70, 47 55, 67 49 C 87 43, 97 36, 95 24 C 83 36, 65 38, 50 42 C 27 50, 17 70, 27 95 Z" fill="#13A26B"/><path d="M37 85 C 45 70, 60 58, 78 48" fill="none" stroke="#0F1B2D" stroke-width="2.8" stroke-linecap="round" opacity="0.35"/></svg>
    </div>
    <div class="wm" style="color:#0F1B2D;">stride</div>
    <span style="color:#8B95A7;font-size:11px;margin-left:auto;">Primary</span>
  </div>

  <!-- Compact / header -->
  <div class="bar">
    <div class="chip-sm">
      <svg width="14" height="14" viewBox="0 0 120 120"><path d="M32 92 C 32 70, 47 55, 67 49 C 87 43, 97 36, 95 24 C 83 36, 65 38, 50 42 C 27 50, 17 70, 27 95 Z" fill="#13A26B"/></svg>
    </div>
    <div class="wm-sm" style="color:#0F1B2D;">stride</div>
    <span style="color:#8B95A7;font-size:10px;margin-left:6px;">App bar · 22px</span>
  </div>

  <!-- On navy -->
  <div class="dark">
    <svg width="20" height="20" viewBox="0 0 120 120"><path d="M32 92 C 32 70, 47 55, 67 49 C 87 43, 97 36, 95 24 C 83 36, 65 38, 50 42 C 27 50, 17 70, 27 95 Z" fill="#13A26B"/></svg>
    <div class="wm-sm" style="color:#fff;">stride</div>
    <span style="color:rgba(255,255,255,.55);font-size:10px;margin-left:6px;">On navy</span>
  </div>

</div>
</body></html>
