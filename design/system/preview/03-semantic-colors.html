<!doctype html><html><head><meta charset="utf-8"><title>Semantic</title><link rel="stylesheet" href="../colors_and_type.css"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><style>
body{padding:16px;}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
.col{display:flex;flex-direction:column;gap:4px;}
.sw{width:88px;height:56px;border-radius:12px;border:1px solid var(--hairline);}
.sw-lg{width:120px;height:72px;border-radius:14px;border:1px solid var(--hairline);}
.tile{display:flex;flex-direction:column;gap:6px;}
.tile .name{font-size:12px;font-weight:600;color:var(--fg-1);}
.tile .hex{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);}
</style></head><body>
<div class="row">
  <div class="tile"><div class="sw" style="background:rgba(30,127,92,.10);border-color:rgba(30,127,92,.2);display:flex;align-items:center;justify-content:center;color:#1E7F5C;font-weight:700;font-size:12px;">On track</div><div class="hex">success</div></div>
  <div class="tile"><div class="sw" style="background:rgba(242,169,59,.12);border-color:rgba(242,169,59,.25);display:flex;align-items:center;justify-content:center;color:#B07B20;font-weight:700;font-size:12px;">Close</div><div class="hex">warning</div></div>
  <div class="tile"><div class="sw" style="background:rgba(208,78,54,.10);border-color:rgba(208,78,54,.2);display:flex;align-items:center;justify-content:center;color:#D04E36;font-weight:700;font-size:12px;">Over</div><div class="hex">danger</div></div>
  <div class="tile"><div class="sw" style="background:rgba(15,27,45,.06);border-color:rgba(15,27,45,.12);display:flex;align-items:center;justify-content:center;color:#0F1B2D;font-weight:700;font-size:12px;">Neutral</div><div class="hex">info</div></div>
</div></body></html>
