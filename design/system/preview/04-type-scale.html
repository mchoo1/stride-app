<!doctype html><html><head><meta charset="utf-8"><title>Type scale</title><link rel="stylesheet" href="../colors_and_type.css"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
body{padding:16px;}
.row{display:flex;align-items:baseline;gap:14px;}
.lab{width:70px;flex-shrink:0;font-size:10px;font-weight:600;letter-spacing:.06em;color:var(--fg-3);text-transform:uppercase;font-family:Inter;}
.disp{font-family:Anton, var(--font-display);text-transform:uppercase;letter-spacing:.01em;line-height:1;color:#0F1B2D;}
</style></head><body>
<div style="display:flex;flex-direction:column;gap:12px;">
  <div class="row"><span class="lab">Display</span><span class="disp" style="font-size:48px;">Move. Eat. Connect.</span></div>
  <div class="row"><span class="lab">H1 · 28</span><span style="font-size:28px;font-weight:700;letter-spacing:-.01em;font-family:Inter;">On track today</span></div>
  <div class="row"><span class="lab">H2 · 22</span><span style="font-size:22px;font-weight:700;font-family:Inter;">Nearby hawker</span></div>
  <div class="row"><span class="lab">H3 · 18</span><span style="font-size:18px;font-weight:600;font-family:Inter;">Weekly summary</span></div>
  <div class="row"><span class="lab">Body · 16</span><span style="font-size:16px;font-family:Inter;">Chicken rice at Maxwell fits your budget.</span></div>
  <div class="row"><span class="lab">Small · 14</span><span style="font-size:14px;color:var(--fg-2);font-family:Inter;">450 m · ~550 kcal</span></div>
  <div class="row"><span class="lab">Label · 12</span><span style="font-family:Inter;font-size:11px;font-weight:600;letter-spacing:.06em;color:var(--fg-3);text-transform:uppercase;">TODAY'S MOVE</span></div>
</div>
</body></html>
