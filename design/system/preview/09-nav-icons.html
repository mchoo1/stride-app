<!doctype html><html><head><meta charset="utf-8"><title>Nav icons · outline + fill</title><link rel="stylesheet" href="../colors_and_type.css"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><style>
body{padding:16px;}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
.col{display:flex;flex-direction:column;gap:4px;}
.sw{width:88px;height:56px;border-radius:12px;border:1px solid var(--hairline);}
.sw-lg{width:120px;height:72px;border-radius:14px;border:1px solid var(--hairline);}
.tile{display:flex;flex-direction:column;gap:6px;}
.tile .name{font-size:12px;font-weight:600;color:var(--fg-1);}
.tile .hex{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);}
</style></head><body>
<style>.ni{display:flex;flex-direction:column;gap:6px;align-items:center;} .ni .pair{display:flex;gap:4px;} .ic{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:10px;} .ic.active{background:rgba(30,127,92,.1);color:#1E7F5C;} .ic.idle{color:#8B95A7;}</style>
<div class="row" style="gap:18px;">

<div class="ni">
  <div class="pair">
    <div class="ic idle" data-icon="nav-home-outline"></div>
    <div class="ic active" data-icon="nav-home-fill"></div>
  </div>
  <div class="hex">home</div>
</div>
<div class="ni">
  <div class="pair">
    <div class="ic idle" data-icon="nav-scan-outline"></div>
    <div class="ic active" data-icon="nav-scan-fill"></div>
  </div>
  <div class="hex">scan</div>
</div>
<div class="ni">
  <div class="pair">
    <div class="ic idle" data-icon="nav-eat-outline"></div>
    <div class="ic active" data-icon="nav-eat-fill"></div>
  </div>
  <div class="hex">eat</div>
</div>
<div class="ni">
  <div class="pair">
    <div class="ic idle" data-icon="nav-move-outline"></div>
    <div class="ic active" data-icon="nav-move-fill"></div>
  </div>
  <div class="hex">move</div>
</div>
<div class="ni">
  <div class="pair">
    <div class="ic idle" data-icon="nav-me-outline"></div>
    <div class="ic active" data-icon="nav-me-fill"></div>
  </div>
  <div class="hex">me</div>
</div>
</div>
<script>
(async()=>{
  for(const el of document.querySelectorAll('[data-icon]')){
    const r = await fetch('../assets/icons/'+el.dataset.icon+'.svg');
    el.innerHTML = await r.text();
  }
})();
</script></body></html>
