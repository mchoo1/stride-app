<!doctype html><html><head><meta charset="utf-8"><title>Cards</title><link rel="stylesheet" href="../colors_and_type.css"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><style>
body{padding:16px;}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
.col{display:flex;flex-direction:column;gap:4px;}
.sw{width:88px;height:56px;border-radius:12px;border:1px solid var(--hairline);}
.sw-lg{width:120px;height:72px;border-radius:14px;border:1px solid var(--hairline);}
.tile{display:flex;flex-direction:column;gap:6px;}
.tile .name{font-size:12px;font-weight:600;color:var(--fg-1);}
.tile .hex{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);}
</style></head><body>
<div class="row" style="gap:12px;align-items:stretch;">
  <div style="background:#fff;border:1px solid #E5E9F2;border-radius:16px;padding:16px;box-shadow:0 1px 2px rgba(15,27,45,.04),0 1px 3px rgba(15,27,45,.03);width:200px;">
    <div class="label" style="margin-bottom:6px;">NET KCAL</div>
    <div style="font-size:32px;font-weight:800;letter-spacing:-.01em;">1,240</div>
    <div style="font-size:13px;color:#1E7F5C;font-weight:600;margin-top:2px;">480 left</div>
  </div>
  <div style="background:#fff;border:1px solid #E5E9F2;border-radius:16px;padding:14px;box-shadow:0 1px 2px rgba(15,27,45,.04),0 1px 3px rgba(15,27,45,.03);width:220px;display:flex;gap:12px;align-items:center;">
    <div style="width:44px;height:44px;background:#F3F1EA;border-radius:12px;"></div>
    <div style="flex:1;min-width:0;">
      <div style="font-size:14px;font-weight:600;">Chicken rice</div>
      <div style="font-size:12px;color:#5B6576;">Maxwell · 450 m</div>
    </div>
    <div style="font-size:13px;font-weight:700;">550</div>
  </div>
</div></body></html>
