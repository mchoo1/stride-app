<!doctype html><html><head><meta charset="utf-8"><title>Neutrals</title><link rel="stylesheet" href="../colors_and_type.css"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><style>
body{padding:16px;}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
.col{display:flex;flex-direction:column;gap:4px;}
.sw{width:88px;height:56px;border-radius:12px;border:1px solid var(--hairline);}
.sw-lg{width:120px;height:72px;border-radius:14px;border:1px solid var(--hairline);}
.tile{display:flex;flex-direction:column;gap:6px;}
.tile .name{font-size:12px;font-weight:600;color:var(--fg-1);}
.tile .hex{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);}
</style></head><body>
<div class="row">
  <div class="tile"><div class="sw-lg" style="background:#F7F8FB"></div><div class="name">Canvas</div><div class="hex">#F7F8FB</div></div>
  <div class="tile"><div class="sw-lg" style="background:#FFFFFF"></div><div class="name">Card</div><div class="hex">#FFFFFF</div></div>
  <div class="tile"><div class="sw-lg" style="background:#E5E9F2"></div><div class="name">Hairline</div><div class="hex">#E5E9F2</div></div>
  <div class="tile"><div class="sw-lg" style="background:#0F1B2D"></div><div class="name">Text 1</div><div class="hex">#0F1B2D</div></div>
  <div class="tile"><div class="sw-lg" style="background:#5B6576"></div><div class="name">Text 2</div><div class="hex">#5B6576</div></div>
  <div class="tile"><div class="sw-lg" style="background:#8B95A7"></div><div class="name">Text 3</div><div class="hex">#8B95A7</div></div>
</div></body></html>
