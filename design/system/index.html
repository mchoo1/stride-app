<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Stride · UI kit</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Black&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; background: #EEF0F5; min-height: 100vh; font-family: 'Inter', system-ui; }
    #root { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="tokens.js"></script>
  <script src="abstract.js"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="Icons.jsx"></script>
  <script type="text/babel" src="Components.jsx"></script>
  <script type="text/babel" src="Home.jsx"></script>
  <script type="text/babel" src="Scan.jsx"></script>
  <script type="text/babel" src="Eat.jsx"></script>
  <script type="text/babel" src="Move.jsx"></script>
  <script type="text/babel" src="Me.jsx"></script>

  <script type="text/babel">
    function App() {
      const [tab, setTab] = React.useState(() => localStorage.getItem('stride-tab') || 'home');
      React.useEffect(() => { localStorage.setItem('stride-tab', tab); }, [tab]);

      const screen = {
        home: <HomeScreen onTab={setTab}/>,
        scan: <ScanScreen onTab={setTab}/>,
        eat:  <EatScreen  onTab={setTab}/>,
        move: <MoveScreen onTab={setTab}/>,
        me:   <MeScreen   onTab={setTab}/>,
      }[tab];

      return (
        <IOSDevice>
          <div data-screen-label={tab} style={{ position: 'absolute', inset: 0 }}>
            {screen}
          </div>
        </IOSDevice>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
